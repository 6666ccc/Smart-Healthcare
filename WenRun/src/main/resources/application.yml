server:
  port: 8080

spring:
  application:
    name: HuiLiao

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/huiliao?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456789

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.huiliao.entity
  configuration:
    map-underscore-to-camel-case: true

ai:
  service:
    base-url: http://127.0.0.1:8000
    chat-path: /v1/chat
    chat-stream-path: /v1/chat/stream
    health-path: /health
    connect-timeout: 5s
    read-timeout: 120s
    stream-read-timeout: 10m

logging:
  level:
    com.example.huiliao: debug

oauth:
  jwt:
    secret: ${JWT_SECRET:huiliao-jwt-dev-secret-change-in-prod-must-be-32chars}
    issuer: huiliao
  default-client-id: huiliao-web
  max-refresh-tokens-per-client: 3
