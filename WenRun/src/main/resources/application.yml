server:
  port: 8080

spring:
  application:
    name: WenRun

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/wenrun?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456789

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.wenrun.entity
  configuration:
    map-underscore-to-camel-case: true

ai:
  service:
    base-url: http://127.0.0.1:8000
    chat-path: /v1/chat
    chat-stream-path: /v1/chat/stream
    java-chat-path: /java/chat
    health-path: /health
    connect-timeout: 5s
    read-timeout: 120s
    stream-read-timeout: 10m

logging:
  level:
    com.example.wenrun: debug

# JWT 配置
jwt:
  secret: ${JWT_SECRET:wenrun-jwt-dev-secret-change-in-prod-must-be-32chars}
  expiry: ${JWT_EXPIRY:604800}

# API Key 配置（服务间调用）
wenrun:
  api-key: ${WENRUN_API_KEY:wenrun-dev-api-key-change-in-prod}
